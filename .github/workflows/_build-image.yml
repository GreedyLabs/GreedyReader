name: Build Image

on:
  workflow_call:
    inputs:
      component:
        description: 'Component name (e.g. frontend, backend) — used for cache scope and image name'
        required: true
        type: string
      dockerfile:
        description: 'Path to the Dockerfile'
        required: true
        type: string
      image:
        description: 'Image name (without registry)'
        required: true
        type: string
      version:
        description: 'Version tag to apply (e.g. run number)'
        required: true
        type: string
      no_cache:
        description: 'If true, ignore build cache (use when build secrets changed)'
        required: false
        type: boolean
        default: false
    secrets:
      BUILD_ENV:
        description: 'Optional build-time env file contents, mounted as secret id=build_env'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: build-${{ inputs.component }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ inputs.image }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Write build env file
        if: ${{ secrets.BUILD_ENV != '' }}
        run: |
          printf '%s' "${{ secrets.BUILD_ENV }}" > build.env
          chmod 600 build.env

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ inputs.no_cache }}
          cache-from: ${{ inputs.no_cache && '' || format('type=gha,scope={0}', inputs.component) }}
          cache-to: type=gha,mode=max,scope=${{ inputs.component }}
          secret-files: |
            ${{ secrets.BUILD_ENV != '' && 'build_env=build.env' || '' }}

      - name: Clean up env file
        if: always()
        run: rm -f build.env
