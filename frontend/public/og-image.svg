<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0b1e"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>

    <!-- Brand gradient (violet → indigo, matches app theme) -->
    <linearGradient id="brand" x1="200" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>

    <!-- Glow blur filter -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <circle cx="160" cy="150" r="260" fill="#7c3aed" opacity="0.20" filter="url(#glow)"/>
  <circle cx="1040" cy="480" r="300" fill="#4338ca" opacity="0.20" filter="url(#glow)"/>
  <circle cx="920" cy="90"  r="180" fill="#6d28d9" opacity="0.14" filter="url(#glow)"/>

  <!-- Outer card border -->
  <rect x="40" y="36" width="1120" height="558" rx="20" fill="none" stroke="#6d28d9" stroke-width="1" opacity="0.35"/>

  <!-- ── Book icon ── -->
  <!-- Spine -->
  <rect x="597" y="100" width="5" height="98" rx="2.5" fill="#a78bfa" opacity="0.95"/>

  <!-- Left page -->
  <path d="M 597,106 C 581,103 549,101 516,104
           C 500,105 494,112 494,123
           L 494,193 C 494,200 500,203 516,201
           C 549,198 581,198 597,195 Z"
        fill="#6d28d9" opacity="0.52"/>

  <!-- Right page -->
  <path d="M 602,106 C 618,103 650,101 683,104
           C 699,105 705,112 705,123
           L 705,193 C 705,200 699,203 683,201
           C 650,198 618,198 602,195 Z"
        fill="#4338ca" opacity="0.52"/>

  <!-- Text lines — left page -->
  <line x1="514" y1="138" x2="586" y2="137" stroke="#c4b5fd" stroke-width="1.5" opacity="0.45"/>
  <line x1="514" y1="153" x2="586" y2="152" stroke="#c4b5fd" stroke-width="1.5" opacity="0.45"/>
  <line x1="514" y1="168" x2="568" y2="167" stroke="#c4b5fd" stroke-width="1.5" opacity="0.32"/>

  <!-- Text lines — right page -->
  <line x1="613" y1="138" x2="685" y2="137" stroke="#a5b4fc" stroke-width="1.5" opacity="0.45"/>
  <line x1="613" y1="153" x2="685" y2="152" stroke="#a5b4fc" stroke-width="1.5" opacity="0.45"/>
  <line x1="613" y1="168" x2="661" y2="167" stroke="#a5b4fc" stroke-width="1.5" opacity="0.32"/>

  <!-- ── App name ── -->
  <text x="600" y="295"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="90"
    font-weight="800"
    letter-spacing="-2"
    text-anchor="middle"
    fill="url(#brand)">GreedyReader</text>

  <!-- "AI 독서노트" badge -->
  <rect x="503" y="313" width="194" height="36" rx="18" fill="#6d28d9" opacity="0.42"/>
  <text x="600" y="337"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="19"
    font-weight="600"
    text-anchor="middle"
    fill="#e9d5ff">AI 독서노트</text>

  <!-- Divider -->
  <line x1="430" y1="372" x2="770" y2="372" stroke="#6d28d9" stroke-width="1" opacity="0.45"/>

  <!-- Tagline -->
  <text x="600" y="406"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="400"
    text-anchor="middle"
    fill="#9ca3af">기록하고, 돌아보고, 다시 읽는 나만의 서재</text>

  <!-- Feature tags -->
  <!-- 4 pills × 120px + 3 gaps × 12px = 516px → start at x = 600 - 258 = 342 -->
  <rect x="342" y="442" width="120" height="34" rx="17" fill="#3b0764" opacity="0.70"/>
  <text x="402" y="464"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="14" font-weight="500" text-anchor="middle" fill="#c4b5fd">독서 기록</text>

  <rect x="474" y="442" width="120" height="34" rx="17" fill="#3b0764" opacity="0.70"/>
  <text x="534" y="464"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="14" font-weight="500" text-anchor="middle" fill="#c4b5fd">AI 책 토론</text>

  <rect x="606" y="442" width="120" height="34" rx="17" fill="#3b0764" opacity="0.70"/>
  <text x="666" y="464"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="14" font-weight="500" text-anchor="middle" fill="#c4b5fd">도서 추천</text>

  <rect x="738" y="442" width="120" height="34" rx="17" fill="#3b0764" opacity="0.70"/>
  <text x="798" y="464"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="14" font-weight="500" text-anchor="middle" fill="#c4b5fd">독서 통계</text>

  <!-- URL -->
  <text x="600" y="558"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="18"
    font-weight="400"
    text-anchor="middle"
    fill="#6b7280">read.greedylabs.kr</text>
</svg>
